name: Laravel CI & CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:

  laravel-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tlamanalli_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, intl, pgsql, pdo_pgsql
        coverage: none

    - name: Copy .env
      run: cp .env.example .env

    - name: Configure environment for CI
      run: |
        sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=pgsql/" .env
        sed -i "s/DB_HOST=.*/DB_HOST=127.0.0.1/" .env
        sed -i "s/DB_PORT=.*/DB_PORT=5432/" .env
        sed -i "s/DB_DATABASE=.*/DB_DATABASE=tlamanalli_test/" .env
        sed -i "s/DB_USERNAME=.*/DB_USERNAME=postgres/" .env
        sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=postgres/" .env

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Generate APP_KEY
      run: php artisan key:generate

    - name: Run migrations
      run: php artisan migrate --force

    - name: Run tests
      run: php artisan test


  deploy-to-render:
    if: github.ref == 'refs/heads/main'   # 👈 SOLO DEPLOY EN MAIN
    needs: laravel-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v1
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
